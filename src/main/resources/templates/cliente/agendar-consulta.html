<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agendar Cita - Veterinaria Americana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f6f9 0%, #e8eff7 100%);
        }
        .form-card {
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
            border: none;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 11px 14px;
        }
        .btn-action {
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container d-flex justify-content-center">
        <div class="card form-card p-4 p-sm-5 w-100" style="max-width: 560px;">
            
            <div class="text-center mb-4">
                <div class="text-primary display-5 mb-2"><i class="bi bi-calendar-check-fill"></i></div>
                <h3 class="fw-bold text-dark mb-1">📅 Reservar Cita Médica</h3>
                <p class="text-muted small">Selecciona la fecha y detalla los motivos para agendar el control médico</p>
            </div>
            
            <form th:action="@{/cliente/agenda/guardar}" th:object="${consulta}" method="post">
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Selecciona tu Mascota</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-github"></i></span>
                        <select th:field="*{mascota.id}" class="form-select bg-light border-start-0" required>
                            <option th:each="m : ${mascotas}" th:value="${m.id}" th:text="${m.nombre} + ' (' + ${m.especie} + ')'"></option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Fecha y Hora Tentativa</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-clock"></i></span>
                        <input type="datetime-local" th:field="*{fechaHora}" class="form-control bg-light border-start-0" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Motivo de la Cita</label>
                    <textarea th:field="*{motivo}" class="form-control bg-light" rows="3" required placeholder="Describe brevemente los síntomas o el motivo del control médico..."></textarea>
                </div>
                
                <div class="row g-3">
                    <div class="col-6">
                        <a th:href="@{/cliente/panel}" class="btn btn-outline-secondary btn-action w-100">
                            <i class="bi bi-arrow-left-short"></i> Volver
                        </a>
                    </div>
                    <div class="col-6">
                        <button type="submit" class="btn btn-primary btn-action w-100 shadow-sm">
                            Agendar Cita <i class="bi bi-arrow-right-short"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

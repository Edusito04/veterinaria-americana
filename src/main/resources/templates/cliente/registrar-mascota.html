<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Mascota - Veterinaria Americana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f4f7f6 0%, #e9f5ee 100%);
        }
        .form-card {
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            background-color: #ffffff;
            border: none;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 11px 14px;
        }
        .btn-action {
            border-radius: 8px;
            padding: 10px 20px;
            font-weight: 600;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="container d-flex justify-content-center">
        <div class="card form-card p-4 p-sm-5 w-100" style="max-width: 520px;">
            
            <div class="text-center mb-4">
                <div class="text-success display-5 mb-2"><i class="bi bi-heart-pulse"></i></div>
                <h3 class="fw-bold text-dark mb-1">🐾 Nueva Mascota</h3>
                <p class="text-muted small">Ingresa los datos de tu compañero para darlo de alta en el sistema</p>
            </div>
            
            <form th:action="@{/cliente/mascota/guardar}" th:object="${mascota}" method="post">
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Nombre de la Mascota</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-tag"></i></span>
                        <input type="text" th:field="*{nombre}" class="form-control bg-light border-start-0" required placeholder="Ej: Lucas">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Especie</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-fingerprint"></i></span>
                        <select th:field="*{especie}" class="form-select bg-light border-start-0" required>
                            <option value="Perro">Perro</option>
                            <option value="Gato">Gato</option>
                            <option value="Ave">Ave</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Raza</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-info-circle"></i></span>
                        <input type="text" th:field="*{raza}" class="form-control bg-light border-start-0" placeholder="Ej: Shitzu">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Edad (Anual)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-calendar3"></i></span>
                        <input type="number" th:field="*{edad}" class="form-control bg-light border-start-0" min="0" required placeholder="0">
                    </div>
                </div>
                
                <div class="row g-3">
                    <div class="col-6">
                        <a th:href="@{/cliente/panel}" class="btn btn-outline-secondary btn-action w-100">
                            <i class="bi bi-x-circle me-1"></i> Cancelar
                        </a>
                    </div>
                    <div class="col-6">
                        <button type="submit" class="btn btn-success btn-action w-100 shadow-sm">
                            <i class="bi bi-check-circle me-1"></i> Guardar
                        </button>
                    </div>
                </div>
                
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

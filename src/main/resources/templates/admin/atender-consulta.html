<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Atención Médica - Veterinaria Americana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center my-5">

    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 600px;">
        <h3 class="fw-bold text-center text-primary mb-2">🩺 Ficha Clínica de Atención</h3>
        <p class="text-muted text-center small mb-4">Ingrese los hallazgos y prescripción médica de la consulta realizada</p>
        
        <form th:action="@{/admin/consulta/atender/guardar}" method="post">
            <input type="hidden" name="consultaId" th:value="${consultaId}">
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Diagnóstico Clínico</label>
                <textarea name="diagnostico" class="form-control" rows="3" required placeholder="Escriba la evaluación física y diagnóstico encontrado..."></textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Tratamiento Recetado</label>
                <textarea name="tratamiento" class="form-control" rows="3" required placeholder="Detalle la medicación, dosis, horarios y cuidados requeridos..."></textarea>
            </div>
            
			<div class="mb-4">
			    <label class="form-label small fw-bold text-secondary">Historial de Vacunación / Modificaciones</label>
			    <textarea name="vacunas" class="form-control" rows="2" placeholder="Ej: Se aplicó refuerzo de vacuna quíntuple. Próxima dosis en 6 meses."></textarea>
			</div>
            
            <div class="d-flex justify-content-between">
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary w-45">Regresar al Panel</a>
                <button type="submit" class="btn btn-success w-45">Guardar Ficha Médica</button>
            </div>
        </form>
    </div>

</body>
</html>
